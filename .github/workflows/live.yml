name: ABS Auditor — live (per-game)

on:
  schedule:
    # Every 20 min during MLB game hours: 11 AM – 1 AM ET = 15:00–06:00 UTC
    - cron: "*/20 15-23 * * *"
    - cron: "*/20 0-6  * * *"
  workflow_dispatch:   # manual trigger

jobs:
  live:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live pipeline
        env:
          TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python main.py --live --post

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/season_stats.json data/posted_games.json || true
          git diff --staged --quiet || \
            git commit -m "Live run state update [$(date -u +%Y-%m-%dT%H:%M)]"
          git push || echo "Nothing to push"

      - name: Upload output images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-output-${{ github.run_id }}
          path: output/
          retention-days: 3
